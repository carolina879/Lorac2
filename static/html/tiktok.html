<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EduShorts - Aprenda se divertindo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-0:   #0f0d0a;
            --bg-1:   #161310;
            --bg-2:   #1e1a15;
            --bg-3:   #27211a;
            --bg-4:   #322a21;
            --accent:      #e8a04a;
            --accent-soft: rgba(232,160,74,0.12);
            --accent-glow: 0 0 32px rgba(232,160,74,0.3);
            --terracotta: #c96a4a;
            --sage:       #7a9e7e;
            --dust:       #b8a89a;
            --ink:        #d4c8be;
            --text-0: #f0e8de;
            --text-1: #b8a89a;
            --text-2: #7a6e65;
            --border:        rgba(255,220,170,0.07);
            --border-warm:   rgba(232,160,74,0.25);
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body:    'DM Sans', system-ui, sans-serif;
            --font-mono:    'DM Mono', monospace;
            --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: var(--text-0);
            font-family: var(--font-body);
            overflow: hidden;
        }

        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 18px 20px 14px;
            display: flex;
            justify-content: center;
            gap: 28px;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(15,13,10,0.75) 0%, transparent 100%);
        }

        .tab {
            font-family: var(--font-body);
            font-weight: 500;
            font-size: 15px;
            color: rgba(240,232,222,0.45);
            cursor: pointer;
            padding-bottom: 5px;
            letter-spacing: 0.01em;
            transition: color 0.2s;
            position: relative;
        }

        .tab.active {
            color: var(--text-0);
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 24px; height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 62px;
            background: rgba(10,8,6,0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-around;
            z-index: 100;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-2);
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.03em;
            padding: 6px 12px;
            border-radius: 10px;
            transition: color 0.18s var(--ease-out);
            flex: 1;
        }
        .nav-item svg { transition: transform 0.18s var(--ease-spring); }
        .nav-item:hover { color: var(--text-1); }
        .nav-item:hover svg { transform: translateY(-2px); }
        .nav-item.active { color: var(--text-0); }
        .nav-item.active svg path,
        .nav-item.active svg rect,
        .nav-item.active svg circle { stroke: var(--text-0); }

        
        .nav-plus {
            flex: 0 0 56px;
            width: 56px; height: 36px;
            background: var(--text-0);
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.18s var(--ease-spring), filter 0.18s;
        }
        .nav-plus::before,
        .nav-plus::after {
            content: '';
            position: absolute;
            background: var(--accent);
            border-radius: 2px;
        }
        .nav-plus::before { width: 3px; height: 18px; }
        .nav-plus::after  { width: 18px; height: 3px; }
        .nav-plus:hover { transform: scale(1.08); filter: brightness(0.9); }
        .nav-plus.open { transform: rotate(45deg) scale(1.05); }

        
        .upload-menu {
            position: fixed;
            bottom: 74px; left: 50%;
            transform: translateX(-50%) translateY(12px);
            background: var(--bg-2);
            border: 1px solid var(--border-warm);
            border-radius: 18px;
            padding: 8px;
            display: flex;
            gap: 8px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.22s var(--ease-out), transform 0.22s var(--ease-spring);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .upload-menu.open {
            opacity: 1;
            pointer-events: all;
            transform: translateX(-50%) translateY(0);
        }
        .upload-opt {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--text-1);
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.01em;
            transition: background 0.15s, color 0.15s;
            min-width: 88px;
        }
        .upload-opt:hover { background: var(--bg-3); color: var(--text-0); }
        .upload-opt svg { opacity: 0.85; }
        .upload-opt:hover svg { opacity: 1; }

        
        .upload-overlay {
            position: fixed;
            inset: 0;
            z-index: 150;
            display: none;
        }
        .upload-overlay.open { display: block; }

        .feed {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .feed::-webkit-scrollbar { display: none; }

        .video-card {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        
        .video-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                transparent 40%,
                rgba(15,13,10,0.3) 65%,
                rgba(15,13,10,0.75) 100%
            );
            pointer-events: none;
            z-index: 1;
        }

        .progress-bar {
            position: absolute;
            bottom: 0; left: 0;
            height: 2px;
            background: var(--accent);
            width: 0%;
            z-index: 15;
            border-radius: 0 2px 2px 0;
            transition: width 0.1s linear;
        }

        
        .side-buttons {
            position: absolute;
            right: 14px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            z-index: 10;
        }

        .side-btn {
            background: none;
            border: none;
            color: var(--text-0);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-mono);
            font-weight: 400;
            letter-spacing: 0.02em;
            transition: transform 0.15s var(--ease-spring);
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
        }

        .side-btn:active { transform: scale(0.88); }

        
        .side-icon {
            width: 32px;
            height: 32px;
            display: block;
            filter: drop-shadow(0 1px 4px rgba(0,0,0,0.5));
            transition: transform 0.18s var(--ease-spring);
        }

        .heart-icon .heart-fill {
            fill: none;
            stroke: white;
            stroke-width: 1.8px;
            transition: fill 0.22s ease, stroke 0.22s ease;
        }

        .side-btn.liked .heart-icon .heart-fill {
            fill: var(--accent);
            stroke: var(--accent);
        }

        .bookmark-icon .bookmark-fill {
            fill: none;
            stroke: white;
            stroke-width: 1.8px;
            transition: fill 0.22s ease, stroke 0.22s ease;
        }

        .side-btn.saved .bookmark-icon .bookmark-fill {
            fill: var(--accent);
            stroke: var(--accent);
        }

        
        .side-btn.like-pop .side-icon {
            animation: heartPop 0.45s var(--ease-spring) forwards;
        }

        @keyframes heartPop {
            0%   { transform: scale(1); }
            30%  { transform: scale(1.45); }
            55%  { transform: scale(0.85); }
            80%  { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        
        .heart-particles {
            position: absolute;
            pointer-events: none;
            z-index: 200;
        }
        .heart-particle {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: particleBurst 0.5s ease-out forwards;
        }
        @keyframes particleBurst {
            0%   { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        

        
        .video-info {
            position: absolute;
            bottom: 75px;
            left: 16px;
            right: 80px;
            z-index: 10;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .avatar {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--terracotta));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 18px;
            color: var(--bg-0);
            position: relative;
            box-shadow: 0 0 0 2px rgba(232,160,74,0.4);
            flex-shrink: 0;
        }

        .follow-badge {
            position: absolute;
            bottom: -4px; right: -6px;
            background: var(--accent);
            border-radius: 50%;
            width: 20px; height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            border: 2px solid #000;
            cursor: pointer;
            color: var(--bg-0);
            transition: background 0.2s, transform 0.15s var(--ease-spring);
        }
        .follow-badge:hover { transform: scale(1.1); }
        .follow-badge.following {
            background: var(--sage);
            color: var(--bg-0);
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-0);
            letter-spacing: 0.01em;
        }

        .category-chip {
            display: inline-block;
            padding: 2px 10px;
            background: var(--accent-soft);
            border: 1px solid var(--border-warm);
            border-radius: 100px;
            font-size: 10px;
            font-family: var(--font-mono);
            color: var(--accent);
            letter-spacing: 0.03em;
            margin-bottom: 6px;
        }

        .desc {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 6px;
            color: var(--ink);
            font-weight: 300;
        }

        .music {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--dust);
            font-family: var(--font-mono);
            font-weight: 300;
        }

        
        .music-disc {
            width: 18px; height: 18px;
            background: linear-gradient(135deg, var(--bg-3), var(--bg-4));
            border-radius: 50%;
            border: 2px solid var(--border-warm);
            display: flex; align-items: center; justify-content: center;
            animation: spin 4s linear infinite;
            flex-shrink: 0;
        }
        .music-disc::after {
            content: '';
            width: 5px; height: 5px;
            background: var(--bg-0);
            border-radius: 50%;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        
        .modal {
            position: fixed;
            bottom: -100%; left: 0;
            width: 100%;
            background: var(--bg-1);
            border-radius: 22px 22px 0 0;
            border-top: 1px solid var(--border);
            z-index: 200;
            transition: bottom 0.35s var(--ease-out);
            padding: 20px;
            max-height: 78vh;
            overflow-y: auto;
        }
        .modal.open { bottom: 0; }

        .modal-handle {
            width: 36px; height: 3px;
            background: var(--bg-4);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-0);
        }

        .close-modal {
            background: var(--bg-3);
            border: none;
            color: var(--text-2);
            width: 28px; height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .close-modal:hover { background: var(--bg-4); color: var(--text-0); }

        .comment-list { margin-bottom: 20px; }

        .comment-item {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            padding: 6px 0;
        }

        .comment-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--terracotta));
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 13px;
            color: var(--bg-0);
            flex-shrink: 0;
        }

        .comment-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-0);
            margin-bottom: 3px;
        }

        .comment-text {
            font-size: 13px;
            color: var(--text-1);
            line-height: 1.4;
            font-weight: 300;
        }

        .comment-input-area {
            display: flex;
            gap: 10px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .comment-input {
            flex: 1;
            background: var(--bg-2);
            border: 1px solid var(--border);
            padding: 11px 16px;
            border-radius: 30px;
            color: var(--text-0);
            font-size: 14px;
            font-family: var(--font-body);
            transition: border-color 0.2s;
        }
        .comment-input:focus { outline: none; border-color: var(--border-warm); background: var(--bg-2); }

        .send-btn {
            background: var(--accent);
            border: none;
            padding: 0 18px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            color: var(--bg-0);
            font-family: var(--font-body);
            font-size: 13px;
            transition: filter 0.15s;
        }
        .send-btn:hover { filter: brightness(1.1); }

        .post-modal {
            position: fixed;
            bottom: -100%; left: 0;
            width: 100%;
            background: var(--bg-1);
            border-radius: 22px 22px 0 0;
            border-top: 1px solid var(--border);
            z-index: 200;
            transition: bottom 0.35s var(--ease-out);
            padding: 20px;
        }
        .post-modal.open { bottom: 0; }

        
        .tiktok-camera {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 400;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s var(--ease-out);
            pointer-events: none;
        }
        .tiktok-camera.open { transform: translateY(0); pointer-events: all; }

        .cam-preview {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        
        .cam-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
        }
        .cam-close {
            background: none; border: none;
            color: #fff; font-size: 26px;
            cursor: pointer; line-height: 1;
            padding: 4px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .cam-add-sound {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            padding: 7px 14px;
            color: #fff; font-size: 13px;
            font-family: var(--font-body); font-weight: 500;
            cursor: pointer;
        }

        
        .cam-tools {
            position: absolute;
            top: 80px; right: 14px;
            display: flex; flex-direction: column;
            align-items: center; gap: 18px;
            z-index: 10;
        }
        .cam-tool {
            display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            background: none; border: none;
            color: #fff; cursor: pointer;
            font-size: 10px; font-family: var(--font-mono);
            filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
        }
        .cam-tool-icon {
            width: 42px; height: 42px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        
        .cam-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding-bottom: max(24px, env(safe-area-inset-bottom));
            z-index: 10;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 100%);
        }
        .cam-duration-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .cam-dur {
            background: rgba(255,255,255,0.15);
            border: 1.5px solid transparent;
            border-radius: 20px;
            padding: 5px 14px;
            color: rgba(255,255,255,0.7);
            font-size: 13px; font-family: var(--font-body);
            font-weight: 500; cursor: pointer;
            transition: all 0.15s;
        }
        .cam-dur.active {
            border-color: #fff;
            color: #fff;
            background: rgba(255,255,255,0.25);
        }

        
        .cam-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            margin-bottom: 16px;
        }

        
        .cam-gallery-btn {
            width: 52px; height: 52px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.4);
            overflow: hidden;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .cam-gallery-btn input[type=file] {
            position: absolute; inset: 0;
            opacity: 0; cursor: pointer;
            width: 100% !important; height: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
            border: none !important;
            background: none !important;
            font-size: 0;
        }
        .cam-gallery-btn svg { pointer-events: none; }

        
        .cam-record-wrap {
            position: relative;
            width: 76px; height: 76px;
            display: flex; align-items: center; justify-content: center;
        }
        .cam-record-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 4px solid #fff;
            transition: border-color 0.2s;
        }
        .cam-record-ring.recording { border-color: #fe2c55; }
        .cam-record-btn {
            width: 58px; height: 58px;
            border-radius: 50%;
            background: #fe2c55;
            border: none; cursor: pointer;
            transition: border-radius 0.2s, transform 0.2s;
            box-shadow: 0 0 18px rgba(254,44,85,0.5);
        }
        .cam-record-btn.recording {
            border-radius: 10px;
            transform: scale(0.68);
        }

        
        .cam-flip {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        
        .cam-timer {
            position: absolute;
            top: 60px; left: 50%;
            transform: translateX(-50%);
            background: rgba(254,44,85,0.85);
            color: #fff;
            font-family: var(--font-mono);
            font-size: 13px; font-weight: 500;
            padding: 4px 14px;
            border-radius: 20px;
            z-index: 10;
            display: none;
        }
        .cam-timer.visible { display: block; }

        
        .cam-progress {
            position: absolute;
            top: 0; left: 0;
            height: 3px;
            background: #fe2c55;
            width: 0%;
            z-index: 20;
            transition: width 0.25s linear;
        }

        
        .cam-preview-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 500;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s var(--ease-out);
            pointer-events: none;
        }
        .cam-preview-screen.open { transform: translateY(0); pointer-events: all; }

        .preview-video {
            flex: 1;
            width: 100%;
            object-fit: cover;
        }
        .preview-bottom {
            padding: 18px 20px max(20px, env(safe-area-inset-bottom));
            background: var(--bg-1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .preview-top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
        }
        .preview-back-btn {
            background: rgba(0,0,0,0.4);
            border: none; color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        input:not([type=file]), textarea, select {
            background: var(--bg-2);
            border: 1px solid var(--border);
            padding: 13px 15px;
            border-radius: 12px;
            color: var(--text-0);
            font-size: 14px;
            font-family: var(--font-body);
            font-weight: 300;
            transition: border-color 0.2s;
            width: 100%;
        }
        input:not([type=file]):focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--border-warm);

        textarea { resize: none; }

            border: none;

            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            color: var(--bg-0);
            font-size: 15px;
            font-family: var(--font-body);
            letter-spacing: 0.01em;
            transition: filter 0.15s, transform 0.1s;
            width: 100%;
        }
        .publish-btn:hover { filter: brightness(1.08); transform: translateY(-1px); }

        .toast-msg {
            position: fixed;
            bottom: 100px; left: 50%;
            transform: translateX(-50%);
            background: var(--bg-3);
            border: 1px solid var(--border-warm);
            color: var(--text-0);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-family: var(--font-mono);
            font-weight: 300;
            z-index: 300;
            animation: fadeInUp 0.3s var(--ease-spring);
            white-space: nowrap;
        }

        @keyframes fadeInUp {
            from { transform: translateX(-50%) translateY(20px); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        
        .floating-heart {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            animation: igHeartFloat 0.8s var(--ease-spring) forwards;

        .floating-heart svg {
            width: 80px; height: 80px;
            filter: drop-shadow(0 0 20px rgba(232,160,74,0.6));

            0%   { transform: scale(0) rotate(-8deg); opacity: 0; }
            25%  { transform: scale(1.3) rotate(4deg); opacity: 1; }
            55%  { transform: scale(1.1) rotate(-2deg); opacity: 1; }
            80%  { transform: scale(1.15) rotate(0); opacity: 0.9; }
            100% { transform: scale(1.0) translateY(-30px); opacity: 0; }

        function getNextBatch(startIndex) {

            const batch = [];

                batch.push({ ...v, _feedId: v.id + "_" + (startIndex + i) });
            }
            return batch;

        function setupFeedObserver() {
            if (feedObserver) feedObserver.disconnect();

            
            feedObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const videoEl = entry.target.querySelector("video");
                    if (entry.isIntersecting) {
                        videoEl.play().catch(() => {});
                    } else {
                        videoEl.pause();
                    }
                });
            }, { threshold: 0.6 });

            document.querySelectorAll(".video-card").forEach(card => feedObserver.observe(card));

            
            const cards = document.querySelectorAll(".video-card");
            if (!cards.length) return;
            const lastCard = cards[cards.length - 1];

            const loadMoreObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isLoadingMore) {
                    loadMoreObserver.disconnect();
                    const nextStart = loadedVideoIds.length;
                    appendBatch(nextStart);
                }
            }, { threshold: 0.3 });

            loadMoreObserver.observe(lastCard);
        }

        function spawnHeartParticles(btn) {
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const container = document.createElement('div');
            container.className = 'heart-particles';
            container.style.left = cx + 'px';
            container.style.top  = cy + 'px';
            document.body.appendChild(container);
            for (let i = 0; i < 6; i++) {
                const p = document.createElement('div');
                p.className = 'heart-particle';
                const angle = (i / 6) * 360;
                const dist  = 22 + Math.random() * 14;
                const tx = Math.cos(angle * Math.PI / 180) * dist;
                const ty = Math.sin(angle * Math.PI / 180) * dist;
                p.style.setProperty('--tx', tx + 'px');
                p.style.setProperty('--ty', ty + 'px');
                p.style.animationDelay = (i * 0.04) + 's';
                container.appendChild(p);
            }
            setTimeout(() => container.remove(), 700);
        }

        async function startCamera() {

        function startCamRecording() {
            if (!cameraStream) {
                showToast("⚠️ Câmera ainda carregando...");
                return;
            }

            recordedChunks = [];

            
            const mimeTypes = [
                "video/webm;codecs=vp9,opus",
                "video/webm;codecs=vp8,opus",
                "video/webm;codecs=h264,opus",
                "video/webm",
                "video/mp4",
                ""
            ];
            let chosenMime = "";
            for (const mime of mimeTypes) {
                try {
                    if (!mime || MediaRecorder.isTypeSupported(mime)) {
                        chosenMime = mime;
                        break;
                    }
                } catch(e) {}
            }

            try {
                mediaRecorder = chosenMime
                    ? new MediaRecorder(cameraStream, { mimeType: chosenMime })
                    : new MediaRecorder(cameraStream);
            } catch(e) {
                showToast("⚠️ Gravação não suportada neste navegador");
                return;
            }

            mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onerror = (e) => {
                showToast("⚠️ Erro ao gravar");
                stopCamRecording(false);
            };
            mediaRecorder.onstop = () => {
                if (!recordedChunks.length) { showToast("⚠️ Nenhum dado gravado"); return; }
                const mime = mediaRecorder.mimeType || "video/webm";
                const blob = new Blob(recordedChunks, { type: mime });
                pendingVideoUrl = URL.createObjectURL(blob);
                openPreviewScreen(pendingVideoUrl);
            };

            mediaRecorder.start(100);
            camRecording = true;
            camElapsed = 0;

            document.getElementById("camRecordBtn").classList.add("recording");
            document.getElementById("camRecordRing").classList.add("recording");
            document.getElementById("camTimer").classList.add("visible");
            document.getElementById("camProgress").style.width = "0%";

            camTimerInterval = setInterval(() => {
                camElapsed++;
                const mm = String(Math.floor(camElapsed / 60)).padStart(2, "0");
                const ss = String(camElapsed % 60).padStart(2, "0");
                const timerEl = document.getElementById("camTimer");
                const progressEl = document.getElementById("camProgress");
                if (timerEl) timerEl.textContent = `${mm}:${ss}`;
                if (progressEl) progressEl.style.width = `${(camElapsed / camMaxDuration) * 100}%`;
                if (camElapsed >= camMaxDuration) stopCamRecording(true);
            }, 1000);
        }

        function stopCamRecording(save) {
            if (!camRecording) return;
            camRecording = false;
            clearInterval(camTimerInterval);
            camTimerInterval = null;
            const btn = document.getElementById("camRecordBtn");
            const ring = document.getElementById("camRecordRing");
            const timer = document.getElementById("camTimer");
            const progress = document.getElementById("camProgress");
            if (btn) btn.classList.remove("recording");
            if (ring) ring.classList.remove("recording");
            if (timer) timer.classList.remove("visible");
            if (progress) progress.style.width = "0%";
            if (save && mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
        }

        }

        function closeProfilePanel() {
            document.getElementById('profilePanel').classList.remove('open');
            setNavActive('navHome');
        }

        function renderProfilePanel() {
            
            let user = null;
            try { user = window.App && window.App.getState ? window.App.getState().user : null; } catch(e) {}
            
            if (!user) {
                try { user = JSON.parse(localStorage.getItem('studysync_user')); } catch(e) {}
            }

            
            const avatarEl = document.getElementById('profileAvatar');
            if (user) {
                let profileEmoji = '🧑';
                try {
                    const prefs = JSON.parse(localStorage.getItem('studysync_profile_' + user.id));
                    if (prefs && prefs.profileEmoji && prefs.profileEmoji !== '🧑') profileEmoji = prefs.profileEmoji;
                    else if (user.avatar && user.avatar !== '🦊') profileEmoji = user.avatar;
                } catch(e) {}

                const isEmoji = /\p{Emoji_Presentation}/u.test(profileEmoji) || profileEmoji !== '🧑';
                if (avatarEl) {
                    if (isEmoji && profileEmoji !== '🧑') {
                        avatarEl.style.background = 'var(--bg-3)';
                        avatarEl.style.fontSize = '44px';
                        avatarEl.textContent = profileEmoji;
                    } else {
                        avatarEl.style.background = '';
                        avatarEl.style.fontSize = '';
                        avatarEl.textContent = (user.username || 'U')[0].toUpperCase();
                    }
                }

                
                let bio = user.bio || '';
                try {
                    const prefs = JSON.parse(localStorage.getItem('studysync_profile_' + user.id));
                    if (prefs && prefs.profileBio) bio = prefs.profileBio;
                } catch(e) {}

                document.getElementById('profileHeaderName').textContent = '@' + (user.username || '');
                document.getElementById('profileUsername').textContent = user.username || '—';

                const roleEl = document.getElementById('profileRole');
                const roleMap = { professor: '👨‍🏫 Professor', aluno: '📚 Aluno', admin: '⚡ Admin' };
                roleEl.textContent = roleMap[user.role] || user.role || 'Aluno';

                document.getElementById('profileBio').textContent = bio || 'Clique para adicionar uma bio no perfil principal.';

                const sinceEl = document.getElementById('profileSince');
                if (user.created_at) {
                    const d = new Date(user.created_at).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                    sinceEl.textContent = 'Membro desde ' + d;
                }
            } else {
                
                if (avatarEl) avatarEl.textContent = '?';
                document.getElementById('profileUsername').textContent = 'Visitante';
                document.getElementById('profileBio').textContent = 'Faça login para ver seu perfil.';
                document.getElementById('profileRole').textContent = '—';
            }

            
            const myVideos = user ? videos.filter(v => v.user === (user.username || '')) : [];
            const savedVideos = videos.filter(v => v.saved);
            const totalLikes = myVideos.reduce((acc, v) => acc + v.likes, 0);

            document.getElementById('pstat-videos').textContent = myVideos.length;
            document.getElementById('pstat-likes-total').textContent = formatNumber(totalLikes);
            document.getElementById('pstat-saved-total').textContent = savedVideos.length;

            
            renderVideoGrid('profileVideosGrid', myVideos);
            renderVideoGrid('profileSavedGrid', savedVideos);
        }

        function renderVideoGrid(containerId, videoList) {
            const grid = document.getElementById(containerId);
            if (!grid) return;
            if (!videoList.length) {
                grid.innerHTML = `<div class="profile-empty" style="grid-column:1/-1">Nenhum vídeo ainda ✨</div>`;
                return;
            }
            grid.innerHTML = videoList.map(v => `
                <div class="profile-video-thumb" onclick="scrollToVideo('${v.id}'); closeProfilePanel()">
                    <video src="${v.url}" muted playsinline preload="metadata"></video>
                    <div class="profile-video-likes">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        ${formatNumber(v.likes)}
                    </div>
                </div>
            `).join('');
        }

        function scrollToVideo(videoId) {
            const card = document.getElementById('card-' + videoId);
            if (card) card.scrollIntoView({ behavior: 'smooth' });
        }

        

        renderFeed();

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowUp") {
                const container = document.querySelector(".feed");
                container.scrollBy({ top: -window.innerHeight, behavior: "smooth" });
            } else if (e.key === "ArrowDown") {
                const container = document.querySelector(".feed");
                container.scrollBy({ top: window.innerHeight, behavior: "smooth" });
            }
        });
    </script>
</body>
</html>
